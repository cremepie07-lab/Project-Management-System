<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="lh.css">
    <title>Lien he</title>
</head>
<body>
    <div class="lien">
        <h1>Liên hệ</h1>
            <div class="info-card">
                <label for="ten">Họ và tên:</label>
                <input type="text" id="ten" name="ten" placeholder="Nhập họ và tên của bạn">
            </div>
            <div class="info-card">
                <label for="sdt">Số điện thoại:</label>
                <input type="tel" id="sdt" name="sdt" placeholder="Nhập số điện thoại của bạn">
            </div>
            <div class="info-card">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Nhập email của bạn">
            </div>
            <div class="info-card">
                <label for="soluong">Số lượng hành khách người lớn:</label>
                <input type="number" id="soluong" name="soluong">
            </div>
            <div class="info-card">
                <label for="soluongtr">Số lượng hành khách trẻ em:</label>
                <input type="number" id="soluongtr" name="soluongtr">
            </div>
            <div class="info-card">
                <label for="lich"
                    >Ngày khởi hành:</label>
                <input type="date" id="lich" name="lich">
            </div>
            <div class="field">
                <label for="ghi-chu">Ghi chú:</label>
                <textarea name="ghi-chu" id="ghi-chu" placeholder="Nhập ghi chú"></textarea>
            </div>
                <button type="submit" class="btn-submit"> Đặt tour</button>
    </div>
</body>
</html>
